<svg viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="240" height="240" rx="36" fill="#1A7B8E"/>

  <!-- Outer rotated square -->
  <g transform="translate(120, 120) rotate(45) translate(-85, -85)">
    <rect
      x="0"
      y="0"
      width="170"
      height="170"
      fill="#1A7B8E"
      stroke="#FFFFFF"
      stroke-width="8"
    />
  </g>

  <!-- Inner rotated square -->
  <g transform="translate(120, 120) rotate(45) translate(-70, -70)">
    <rect x="0" y="0" width="140" height="140" fill="#2B9AAD"/>
  </g>

  <!-- Text UiT -->
  <text
    x="120"
    y="140"
    font-family="serif"
    font-size="72"
    font-weight="400"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="2"
  >UiT</text>

</svg>